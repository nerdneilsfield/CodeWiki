<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <!-- CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <link id="hljs-css" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11.9.0/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.0.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
    .cw-wrap{display:flex;min-height:100vh;}
    .cw-side{position:fixed;top:0;left:0;width:320px;height:100vh;overflow-y:auto;background:var(--bulma-scheme-main-bis);border-right:1px solid var(--bulma-border);padding:1.25rem;z-index:30;transition:transform .2s;}
    .cw-side.off{transform:translateX(-320px);}
    .cw-body{margin-left:320px;flex:1;min-width:0;padding:2.5rem 3rem;max-width:calc(100% - 320px);}
    .cw-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:25;}
    .cw-overlay.on{display:block;}
    .cw-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;}
    .cw-spinner{width:50px;height:50px;border:4px solid var(--bulma-border);border-top-color:var(--bulma-link);border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .content pre code.hljs{background:transparent!important;}
    .content .mermaid{max-width:none;margin:1.5rem 0;padding:1rem;background:var(--bulma-scheme-main);border:1px solid var(--bulma-border);border-radius:0.5rem;}
    .content .math-block{overflow-x:auto;margin:1.5rem 0;text-align:center;}
    .content .math-inline{display:inline;}
    .content .math-err{color:var(--bulma-danger);background:var(--bulma-danger-light);padding:0 0.25em;border-radius:3px;font-size:0.9em;}
    .hljs{background:transparent!important;}
    .cw-hamburger{display:none;position:fixed;top:0.75rem;left:0.75rem;z-index:35;background:var(--bulma-scheme-main-bis);border:1px solid var(--bulma-border);border-radius:4px;padding:0.4rem 0.55rem;cursor:pointer;line-height:1;}
    @media(max-width:1024px){.cw-side{transform:translateX(-320px);}.cw-side.on{transform:translateX(0);}.cw-body{margin-left:0;padding:1.25rem;max-width:100%;}.cw-hamburger{display:block;}}
    </style>
    <script>(function(){var t=localStorage.getItem('cw-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
    <!-- Mobile hamburger button -->
    <button class="cw-hamburger" id="cw-hamburger" aria-label="Open sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>
    <!-- Overlay for mobile sidebar -->
    <div class="cw-overlay" id="cw-overlay"></div>
    <div class="cw-wrap">
        <!-- Sidebar -->
        <aside class="cw-side" id="cw-side">
            <p class="title is-5 has-text-link mb-4">&#128218; {{TITLE}}</p>
            {{REPO_LINK}}
            <div id="repo-info" class="card mb-4" style="display: {{SHOW_INFO}};">
                <div class="card-content p-3">
                    <p class="is-size-7 has-text-weight-semibold has-text-grey mb-2" style="text-transform:uppercase;letter-spacing:0.05em;">Generation Info</p>
                    <div id="info-content" class="is-size-7" style="line-height:1.6;">{{INFO_CONTENT}}</div>
                </div>
            </div>
            <aside class="menu">
                <ul class="menu-list">
                    <li><a class="is-active" data-file="overview.md">&#128196; Overview</a></li>
                </ul>
                <ul id="navigation" class="menu-list"></ul>
            </aside>
        </aside>
        <!-- Main content -->
        <div class="cw-body">
            <div id="loading" class="cw-loading">
                <div class="cw-spinner"></div>
                <p class="mt-4 has-text-grey">Loading documentation...</p>
            </div>
            <div id="content" class="content is-medium" style="display: none;"></div>
        </div>
    </div>

    <script>
        const CONFIG = {{CONFIG_JSON}};
        const MODULE_TREE = {{MODULE_TREE_JSON}};
        const METADATA = {{METADATA_JSON}};
        const DOCS_BASE_PATH = '{{DOCS_BASE_PATH}}';
        const GUIDE_PAGES = {{GUIDE_PAGES_JSON}};

        marked.setOptions({ breaks: true, gfm: true, headerIds: true, mangle: false });

        mermaid.initialize({
            startOnLoad: false, theme: 'default',
            themeVariables: { primaryColor: '#2563eb', primaryTextColor: '#334155', primaryBorderColor: '#e2e8f0', lineColor: '#64748b', secondaryColor: '#f1f5f9', tertiaryColor: '#f8fafc' },
            flowchart: { htmlLabels: true, curve: 'basis' },
            sequence: { mirrorActors: true, useMaxWidth: true }
        });

        document.addEventListener('DOMContentLoaded', function() {
            buildNavigation();
            loadDocument('overview.md');
            initSidebar();
        });

        // Sidebar toggle logic
        function initSidebar() {
            var side = document.getElementById('cw-side');
            var overlay = document.getElementById('cw-overlay');
            var hamburger = document.getElementById('cw-hamburger');
            var isDesktop = function() { return window.innerWidth > 1024; };

            // Desktop: restore persistence
            if (isDesktop() && localStorage.getItem('cw-sb') === 'off') {
                side.classList.add('off');
            }

            hamburger.addEventListener('click', function() {
                if (isDesktop()) {
                    side.classList.toggle('off');
                    localStorage.setItem('cw-sb', side.classList.contains('off') ? 'off' : 'on');
                } else {
                    side.classList.add('on');
                    overlay.classList.add('on');
                }
            });

            overlay.addEventListener('click', function() {
                side.classList.remove('on');
                overlay.classList.remove('on');
            });

            window.addEventListener('resize', function() {
                if (isDesktop()) {
                    side.classList.remove('on');
                    overlay.classList.remove('on');
                    if (localStorage.getItem('cw-sb') !== 'off') {
                        side.classList.remove('off');
                    }
                }
            });
        }

        function buildNavigation() {
            const nav = document.getElementById('navigation');
            let html = '';

            if (GUIDE_PAGES && GUIDE_PAGES.length > 0) {
                for (const guide of GUIDE_PAGES) {
                    if (guide.subPages && guide.subPages.length > 0) {
                        html += `<li>`;
                        html += `<a data-file="${guide.slug}.md">&#128214; ${guide.label}</a>`;
                        html += `<ul>`;
                        for (const sub of guide.subPages) {
                            html += `<li><a data-file="${sub.slug}.md">${sub.label}</a></li>`;
                        }
                        html += `</ul></li>`;
                    } else {
                        html += `<li><a data-file="${guide.slug}.md">&#128214; ${guide.label}</a></li>`;
                    }
                }
            }

            if (MODULE_TREE) {
                for (const [key, data] of Object.entries(MODULE_TREE)) {
                    html += buildNavItem(key, data, 0);
                }
            }

            nav.innerHTML = html;

            // Click handlers for all menu items
            document.querySelectorAll('[data-file]').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    const file = this.getAttribute('data-file');
                    if (file) {
                        loadDocument(file);
                        document.querySelectorAll('[data-file]').forEach(i => i.classList.remove('is-active'));
                        this.classList.add('is-active');
                        // Close mobile sidebar on nav click
                        if (window.innerWidth <= 1024) {
                            document.getElementById('cw-side').classList.remove('on');
                            document.getElementById('cw-overlay').classList.remove('on');
                        }
                    }
                });
            });
        }

        function buildNavItem(key, data, depth) {
            const fileName = `${key}.md`;
            let html = '';

            if (data.children && Object.keys(data.children).length > 0) {
                html += `<li>`;
                if (data.components && data.components.length > 0) {
                    html += `<a data-file="${fileName}">${formatNavTitle(key)}</a>`;
                } else {
                    html += `<a>${formatNavTitle(key)}</a>`;
                }
                html += `<ul>`;
                for (const [childKey, childData] of Object.entries(data.children)) {
                    html += buildNavItem(childKey, childData, depth + 1);
                }
                html += `</ul></li>`;
            } else {
                html += `<li><a data-file="${fileName}">${formatNavTitle(key)}</a></li>`;
            }

            return html;
        }

        function formatNavTitle(key) {
            return key.replace(/_/g, ' ').split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }

        async function loadDocument(filename) {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            loading.style.display = 'flex';
            content.style.display = 'none';
            try {
                const docPath = DOCS_BASE_PATH ? `${DOCS_BASE_PATH}/${filename}` : filename;
                const response = await fetch(docPath);
                if (!response.ok) throw new Error(`Failed to load ${filename}`);
                const markdown = await response.text();
                const html = await renderMarkdown(markdown);
                content.innerHTML = html;
                loading.style.display = 'none';
                content.style.display = 'block';
                await renderMermaidDiagrams();
                await cwRenderMath(content);
                setupMarkdownLinks();
                // Syntax highlighting
                hljs.highlightAll();
                // a11y for code blocks
                document.querySelectorAll('#content pre').forEach(function(pre) {
                    pre.setAttribute('tabindex', '0');
                    pre.setAttribute('role', 'region');
                    pre.setAttribute('aria-label', 'Code block');
                });
                window.scrollTo(0, 0);
            } catch (error) {
                console.error('Error loading document:', error);
                showError(`Failed to load document: ${filename}`);
            }
        }

        function setupMarkdownLinks() {
            const content = document.getElementById('content');
            const oldListener = content._markdownLinkListener;
            if (oldListener) content.removeEventListener('click', oldListener);
            const listener = function(e) {
                const link = e.target.closest('a');
                if (!link) return;
                const href = link.getAttribute('href');
                if (!href) return;
                const mdMatch = href.match(/([^\/]*\.md(?:#.*)?$)/i);
                if (mdMatch) {
                    e.preventDefault();
                    e.stopPropagation();
                    const filename = mdMatch[1].split('#')[0];
                    loadDocument(filename);
                    document.querySelectorAll('[data-file]').forEach(item => {
                        if (item.getAttribute('data-file') === filename) {
                            document.querySelectorAll('[data-file]').forEach(i => i.classList.remove('is-active'));
                            item.classList.add('is-active');
                        }
                    });
                }
            };
            content._markdownLinkListener = listener;
            content.addEventListener('click', listener);
        }

        // Hybrid math rendering: KaTeX fast path + MathJax async fallback
        var _mjReady = null;
        function _loadMathJax() {
            if (!_mjReady) {
                window.MathJax = { tex: { packages: {'[+]': ['ams', 'newcommand']} }, svg: { fontCache: 'global' }, startup: { typeset: false } };
                _mjReady = new Promise(function(res, rej) {
                    var s = document.createElement('script');
                    s.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js';
                    s.onload = function() { MathJax.startup.promise.then(res, rej); };
                    s.onerror = rej;
                    document.head.appendChild(s);
                });
            }
            return _mjReady;
        }
        async function cwRenderMath(root) {
            if (typeof katex === 'undefined') return;
            root = root || document.body;
            var failed = [];
            root.querySelectorAll('.math-block, .math-inline').forEach(function(el) {
                if (el.dataset.mathDone) return;
                var disp = el.classList.contains('math-block');
                var src = el.textContent.trim().slice(2, -2).trim();
                el.dataset.mathSrc = src;
                el.dataset.mathDone = '1';
                try {
                    el.innerHTML = katex.renderToString(src, { displayMode: disp, throwOnError: true, output: 'html' });
                } catch(e) { failed.push([el, disp]); }
            });
            if (!failed.length) return;
            try {
                await _loadMathJax();
                for (var i = 0; i < failed.length; i++) {
                    var el = failed[i][0], disp = failed[i][1];
                    try {
                        var node = await MathJax.tex2svgPromise(el.dataset.mathSrc, {display: disp});
                        el.innerHTML = ''; el.appendChild(node);
                    } catch(e2) {
                        el.innerHTML = '<code class="math-err" title="' + el.dataset.mathSrc.replace(/"/g, '&#34;') + '">' + el.dataset.mathSrc + '</code>';
                    }
                }
            } catch(loadErr) {
                failed.forEach(function(p) { p[0].innerHTML = '<code class="math-err">' + p[0].dataset.mathSrc + '</code>'; });
            }
        }

        function extractMathBlocks(text) {
            const CJK_RE = /[\u4e00-\u9fff\u3400-\u4dbf]/;
            const blocks = [];
            function escape(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
            text = text.replace(/\$\$([^$]+?)\$\$/gs, function(match, inner) {
                if (CJK_RE.test(inner)) return match;
                const ph = 'CWIKIMD' + String(blocks.length).padStart(6, '0');
                blocks.push([ph, '<div class="math-block">\\[' + escape(inner) + '\\]</div>']);
                return ph;
            });
            text = text.replace(/\$(?!\s)([^$\n]+?)\$(?!\$)/g, function(match, inner) {
                if (CJK_RE.test(inner)) return match;
                const ph = 'CWIKIMI' + String(blocks.length).padStart(6, '0');
                blocks.push([ph, '<span class="math-inline">\\(' + escape(inner) + '\\)</span>']);
                return ph;
            });
            text = text.replace(/\\\[([\s\S]+?)\\\]/g, function(match, inner) {
                if (CJK_RE.test(inner)) return match;
                const ph = 'CWIKIMD' + String(blocks.length).padStart(6, '0');
                blocks.push([ph, '<div class="math-block">\\[' + escape(inner) + '\\]</div>']);
                return ph;
            });
            text = text.replace(/\\\((.+?)\\\)/g, function(match, inner) {
                if (CJK_RE.test(inner)) return match;
                const ph = 'CWIKIMI' + String(blocks.length).padStart(6, '0');
                blocks.push([ph, '<span class="math-inline">\\(' + escape(inner) + '\\)</span>']);
                return ph;
            });
            return [text, blocks];
        }

        function restoreMathBlocks(html, blocks) {
            for (const [ph, mathHtml] of blocks) {
                html = html.replace('<p>' + ph + '</p>', mathHtml);
                html = html.replace(ph, mathHtml);
            }
            return html;
        }

        async function renderMarkdown(markdown) {
            const [textWithPhs, protectedMath] = extractMathBlocks(markdown);
            let html = marked.parse(textWithPhs);
            html = restoreMathBlocks(html, protectedMath);
            html = html.replace(
                /<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g,
                (match, code) => {
                    const decoded = code.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&quot;/g, '"').replace(/&#39;/g, "'");
                    return `<div class="mermaid">${decoded}</div>`;
                }
            );
            return html;
        }

        async function renderMermaidDiagrams() {
            const elements = document.querySelectorAll('.mermaid');
            for (let i = 0; i < elements.length; i++) {
                const el = elements[i];
                const id = `mermaid-${Date.now()}-${i}`;
                el.id = id;
                try {
                    const { svg } = await mermaid.render(id + '-svg', el.textContent);
                    el.innerHTML = svg;
                } catch (error) {
                    console.error('Mermaid rendering error:', error);
                    var src = el.textContent.replace(/</g, '&lt;');
                    el.innerHTML = `<details open><summary style="color:var(--bulma-danger);cursor:pointer;">&#9888; Mermaid error</summary><pre style="font-size:0.75rem;margin-top:0.5rem;white-space:pre-wrap;">${error.message}</pre><pre style="font-size:0.75rem;opacity:0.6;">${src}</pre></details>`;
                }
            }
        }

        function showError(message) {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            loading.style.display = 'none';
            content.style.display = 'block';
            content.innerHTML = `<div class="notification is-danger">&#9888;&#65039; ${message}</div>`;
        }

        // Escape key closes sidebar
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                var side = document.getElementById('cw-side');
                var overlay = document.getElementById('cw-overlay');
                if (window.innerWidth <= 1024) {
                    // Mobile: close if open
                    if (side.classList.contains('on')) {
                        side.classList.remove('on');
                        overlay.classList.remove('on');
                    }
                } else {
                    // Desktop: toggle off
                    side.classList.add('off');
                    localStorage.setItem('cw-sb', 'off');
                }
            }
        });
    </script>
</body>
</html>
