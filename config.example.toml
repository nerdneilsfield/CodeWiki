# CodeWiki configuration example
# Copy to config.toml, fill in your API key env vars, then run:
#   codewiki generate /path/to/repo --config config.toml
#
# Key concepts
# ─────────────────────────────────────────────────────────────
# provider/model  — all model fields use "provider_name/model_name" format.
#                   The provider_name must match a [[providers]] entry below.
#
# env:VAR_NAME    — Reference an env variable for the API key.
#                   CodeWiki resolves it at generation time.
#                   You can also write the key directly: api_keys = ["sk-abc123"]
#                   env: references are recommended for shared/committed configs.
#
# Multiple providers can coexist.  Different pipeline stages
# (main, cluster, fallback, long-context) can draw from different providers.

[runtime]
output_dir         = "docs"     # where generated Markdown is written
max_depth          = 2          # module-tree decomposition depth
max_concurrent     = 3          # parallel LLM workers per pass
max_retries        = 2          # fill-pass retries for skipped modules
output_language    = "en"       # "en" | "zh" | "ja" — output language
postprocess_strict = false      # true = block build on unfixable lint issues

[tokens]
max_tokens                = 32768
max_token_per_module      = 36369
max_token_per_leaf_module = 16000
long_context_threshold    = 200000   # prompt chars above this → long-context model

[generation]
main_model         = "openai/gpt-4o-mini"
cluster_model      = "claude/claude-sonnet-4-5-20250929"
fallback_models    = [
  "openai/gpt-4o-mini",
  "claude/claude-sonnet-4-5-20250929",
]
long_context_model = "openai/gpt-4.1"   # used when prompt exceeds long_context_threshold

[agent]
# Uncomment any of the following to steer documentation generation.
# doc_type            = "architecture"   # api | architecture | user-guide | developer
# focus_modules       = ["src/core", "src/api"]
# custom_instructions = "Prefer diagrams for component relationships."

# ── Providers ────────────────────────────────────────────────────────────────

[[providers]]
name       = "openai"
type       = "openai_compatible"
base_url   = "https://api.openai.com/v1"
api_keys   = ["env:OPENAI_API_KEY"]      # or: api_keys = ["sk-..."] for local use
model_list = [                             # only these models are valid for this provider
  "gpt-4o-mini",
  {name = "gpt-4.1", stream = true},       # stream = true enables streaming fallback on timeout
]
extra_headers = {}

[[providers]]
name              = "claude"
type              = "claude"             # uses native Anthropic SDK path
api_keys          = ["env:ANTHROPIC_API_KEY"]
anthropic_version = "2024-02-15"
model_list        = ["claude-sonnet-4-5-20250929"]
extra_headers     = {}

# ── Additional provider examples (uncomment to enable) ───────────────────────
#
# [[providers]]
# name       = "azure"
# type       = "azure_openai"
# base_url   = "https://<your-resource>.openai.azure.com"
# api_version = "2024-02-01"
# api_keys   = ["env:AZURE_OPENAI_API_KEY"]
# model_list = []                         # empty = accept any model name
# extra_headers = {}
#
# [[providers]]
# name       = "local"
# type       = "openai_compatible"
# base_url   = "http://localhost:11434/v1"   # e.g. Ollama
# api_keys   = ["none"]
# model_list = ["llama3.2", "qwen2.5-coder"]
